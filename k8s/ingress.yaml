apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-port-railway
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: hello.portdemo.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-port-railway
                port:
                  number: 80
